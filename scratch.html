<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px #444;
        }

        #game-container {
            position: relative;
            border: 5px solid #555;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        canvas {
            display: block;
            background-color: #000;
        }

        .stats {
            margin-top: 15px;
            font-size: 1.2rem;
        }

        .controls {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>
    <div class="stats">Score: <span id="scoreVal">0</span></div>
    <div class="controls">Use Arrow Keys to Move</div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;

        // Snake body: array of coordinates
        let snake = [
            {x: 10, y: 10},
            {x: 10, y: 11},
            {x: 10, y: 12}
        ];

        let foodX = 5;
        let foodY = 5;

        // Start game loop
        function main() {
            if (didGameEnd()) {
                // Reset game on death
                alert("Game Over! Your score: " + score);
                resetGame();
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#00FF00" : "#008000"; // Head is brighter
                ctx.strokeStyle = "#000";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // Only move if a direction is set (prevents immediate death at start)
            if (dx === 0 && dy === 0) return;

            snake.unshift(head);

            // Check if snake ate food
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;

            // Hit walls
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;

            // Hit self
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function createFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
            
            // Make sure food doesn't spawn on snake body
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x == foodX && part.y == foodY) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#FF0000";
            ctx.strokeStyle = "#000";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
            ctx.strokeRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
        }

        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -1; dy = 0;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0; dy = -1;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1; dy = 0;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0; dy = 1;
            }
        }

        function resetGame() {
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerHTML = score;
            createFood();
        }

        document.addEventListener("keydown", changeDirection);

        // Prevent arrow keys from scrolling the window
        window.addEventListener("keydown", function(e) {
            if([37, 38, 39, 40].indexOf(e.keyCode) > -1) {
                e.preventDefault();
            }
        }, false);

        createFood();
        main();
    </script>
</body>
</html>
